name: CI/CD
on:
  push:
    branches:
      - main

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v6
        with:
          node-version: 22.14.0
          check-latest: true

      - run: node -v

      - uses: oven-sh/setup-bun@v2

      - run: bun install

      - run: npx semantic-release
